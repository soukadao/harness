services:
  vector:
    image: timberio/vector:0.42.0-alpine
    ports:
      - "${OTLP_GRPC_PORT:-4317}:4317"
      - "${OTLP_HTTP_PORT:-4318}:4318"
    volumes:
      - ./vector.yaml:/etc/vector/vector.yaml:ro
    command: ["--config", "/etc/vector/vector.yaml"]
    depends_on:
      victoria-metrics:
        condition: service_healthy
      victoria-logs:
        condition: service_healthy
      victoria-traces:
        condition: service_healthy
    restart: unless-stopped

  victoria-metrics:
    image: victoriametrics/victoria-metrics:v1.115.0
    ports:
      - "${VM_PORT:-8428}:8428"
    volumes:
      - victoria-metrics-data:/storage
    command:
      - "-storageDataPath=/storage"
      - "-retentionPeriod=7d"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8428/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  victoria-logs:
    image: victoriametrics/victoria-logs:v1.23.0
    ports:
      - "${VL_PORT:-9428}:9428"
    volumes:
      - victoria-logs-data:/vlogs
    command:
      - "-storageDataPath=/vlogs"
      - "-retentionPeriod=7d"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9428/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  victoria-traces:
    image: victoriametrics/victoria-traces:v0.3.0
    ports:
      - "${VT_PORT:-9999}:9999"
    volumes:
      - victoria-traces-data:/vtraces
    command:
      - "-storageDataPath=/vtraces"
      - "-retentionPeriod=7d"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9999/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  victoria-metrics-data:
  victoria-logs-data:
  victoria-traces-data:
